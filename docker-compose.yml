# Local orchestration for postgres, backend, and frontend services.
services:
  postgres:
    image: postgres:16-alpine
    container_name: gamerspot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamerspot
      POSTGRES_PASSWORD: gamerspot_password
      POSTGRES_DB: gamerspot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamerspot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamerspot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gamerspot:gamerspot_password@postgres:5432/gamerspot
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_your_stripe_secret_key
    ports:
      - "5050:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gamerspot-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5050/api
      VITE_STRIPE_PUBLIC_KEY: pk_test_your_stripe_public_key
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
