# Local orchestration for postgres, backend, and frontend services.
services:
  postgres:
    image: postgres:16-alpine
    container_name: grindspot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: grindspot
      POSTGRES_PASSWORD: MYPASSWORD
      POSTGRES_DB: grindspot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grindspot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grindspot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://grindspot:MYPASSWORD@postgres:5432/grindspot_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_your_stripe_secret_key
    ports:
      - "5050:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5050/api
        VITE_STRIPE_PUBLIC_KEY: pk_test_your_stripe_public_key
    container_name: grindspot-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
